name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile (release or debug)'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    name: Check version consistency
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Verify workspace version
        run: |
          CARGO_VERSION=$(grep '^version =' Cargo.toml | head -1 | cut -d'"' -f2)
          TAG_VERSION="${{ steps.get_version.outputs.version }}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Workspace version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $CARGO_VERSION"

  build:
    name: Build release binaries
    needs: [check-version]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
      - name: Build (${{ inputs.profile || 'release' }})
        run: |
          PROFILE="${{ inputs.profile || 'release' }}"
          if [ "$PROFILE" = "release" ]; then
            cargo build --release --workspace --target ${{ matrix.target }}
          else
            cargo build --workspace --target ${{ matrix.target }}
          fi
      - name: Upload binaries as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voidforged-${{ matrix.target }}
          path: target/${{ matrix.target }}/${{ inputs.profile || 'release' }}/
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate release notes
        id: release_notes
        run: |
          {
            echo 'notes<<RELEASE_NOTES'
            echo "## Voidforged ${{ github.ref_name }}"
            echo ""
            echo "### Build artifacts"
            for dir in artifacts/*/; do
              dirname=$(basename "$dir")
              echo "- $dirname"
            done
            echo ""
            if [ -f CHANGELOG.md ]; then
              echo "### Changelog"
              # Take the most recent entry from CHANGELOG.md
              awk '/^## /{count++} count==1{print} count==2{exit}' CHANGELOG.md
            fi
            echo 'RELEASE_NOTES'
          } >> "$GITHUB_OUTPUT"
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Voidforged ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.notes }}
          draft: ${{ github.event.inputs.profile != 'release' }}
          prerelease: false
          files: |
            artifacts/**/*
